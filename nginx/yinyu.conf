# ============================================================
# yinyu Nginx 配置示例
#   - /api/          反代到 FastAPI (uvicorn 127.0.0.1:8000)
#   - /uploads/      直接代理磁盘目录 /data/uploads/ (不经后端,性能高)
#   - /              Web 管理后台静态资源
# 部署:复制到 /etc/nginx/conf.d/yinyu.conf,nginx -t && nginx -s reload
# ============================================================

server {
    listen 80;
    server_name yinyu.example.com;

    # 文件上传上限,略大于后端 MAX_UPLOAD_MB
    client_max_body_size 60m;

    # ---------- 静态上传文件:Nginx 直连磁盘 ----------
    location /uploads/ {
        alias /data/uploads/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        # 防止目录穿越
        internal off;
    }

    # ---------- API ----------
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # 可选:开发期放行 Swagger 文档(生产建议关闭)
    location ~ ^/(docs|openapi.json|redoc|health) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # ---------- Web 管理后台(构建产物) ----------
    root /data/web/yinyu-admin;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml;
    gzip_min_length 1024;
}
